package:
  name: python-example
  version: '{{ PACKAGE_VERSION }}'
source:
  path: ../python
requirements:
  build:
  - setuptools
  run:
  - functions-python-api >={{ FUNCTIONS_PYTHON_API_VERSION }}, <1
  - scipy==1.12.0
  - numpy==1.26.4
  - ontology_sdk==0.1.0
  - scikit-learn==1.4.1.post1
build:
  script: python setup.py install --single-version-externally-managed --record=record.txt
  noarch: python
